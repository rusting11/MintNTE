name: 自动打包发布

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python 3.10 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 确认 Python 环境
        shell: pwsh
        run: |
          python --version
          python -m pip install --upgrade pip

      - name: 安装 VC++ 运行库（打包环境）
        shell: pwsh
        run: |
          # 安装 Visual C++ 2015-2022 运行库，确保打包时 DLL 依赖齐全
          $url = "https://aka.ms/vs/17/release/vc_redist.x64.exe"
          Invoke-WebRequest -Uri $url -OutFile "vc_redist.exe"
          Start-Process -Wait -FilePath ".\vc_redist.exe" -ArgumentList "/install /quiet /norestart"
          Write-Host "VC++ runtime installed"

      - name: 安装 Python 依赖
        shell: pwsh
        run: |
          pip install -r requirements.txt

      - name: 打包 MintNTE.exe (强制内含 python310.dll)
        shell: pwsh
        run: |
          # 1. 定位并复制 Python 核心 DLL 到当前目录
          $pythonHome = python -c "import sys; print(sys.base_prefix)"
          $dllName = "python310.dll"
          $dllPath = Join-Path $pythonHome $dllName
          if (-not (Test-Path $dllPath)) {
            # 如果找不到 python310.dll，尝试 python3.dll（某些版本）
            $dllName = "python3.dll"
            $dllPath = Join-Path $pythonHome $dllName
          }
          if (Test-Path $dllPath) {
            Copy-Item $dllPath -Destination $dllName -Force
            Write-Host "Copied $dllName from $pythonHome"
          } else {
            Write-Host "ERROR: Core Python DLL not found! Exiting."
            exit 1
          }

          # 2. 打包，使用 --add-binary 强制包含
          pyinstaller --noconfirm --onefile --noconsole `
            --name MintNTE `
            --icon "Image/logo/titlelogo.ico" `
            --add-data "Image;Image" `
            --add-data "core;core" `
            --add-data "core/fishing/fishingimages;fishingimages" `
            --add-data "core/fishing/fishingimages/rank_fish;rank_fish" `
            --add-data "Module;Module" `
            --add-data "UI;UI" `
            --add-data "updater;updater" `
            --add-data "version.txt;." `
            --add-binary "${dllName};." `
            --hidden-import=pygame `
            --hidden-import=dxcam `
            --hidden-import=pydirectinput `
            --hidden-import=keyboard `
            --hidden-import=mouse `
            --hidden-import=cv2 `
            --hidden-import=numpy `
            --hidden-import=PIL `
            --hidden-import=win32gui `
            --hidden-import=win32ui `
            --hidden-import=win32con `
            --hidden-import=ctypes `
            --hidden-import=comtypes `
            --hidden-import=logging `
            --hidden-import=psutil `
            --collect-all dxcam `
            --collect-all pydirectinput `
            --collect-all windows_capture `
            main.py

      - name: 打包完整源码 (MintNTE.zip)
        shell: pwsh
        run: |
          $tmp = [System.IO.Path]::GetTempPath()
          $pkgDir = Join-Path $tmp "mint_src_pkg"
          New-Item -ItemType Directory -Force -Path $pkgDir | Out-Null
          Get-ChildItem -Path . -Exclude $pkgDir | Copy-Item -Destination $pkgDir -Recurse -Force
          Remove-Item -Recurse -Force "$pkgDir\.git" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "$pkgDir\__pycache__" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "$pkgDir\dist" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "$pkgDir\build" -ErrorAction SilentlyContinue
          Remove-Item -Force "$pkgDir\*.log" -ErrorAction SilentlyContinue
          Remove-Item -Force "$pkgDir\debug_screenshot.png" -ErrorAction SilentlyContinue
          Remove-Item -Force "$pkgDir\macro_config.json" -ErrorAction SilentlyContinue
          Compress-Archive -Path "$pkgDir\*" -DestinationPath "MintNTE.zip" -Force
          Remove-Item -Recurse -Force $pkgDir

      - name: 计算 SHA256
        id: sha256
        shell: pwsh
        run: |
          $sha = (Get-FileHash -Algorithm SHA256 "MintNTE.zip").Hash.ToLower()
          echo "sha=$sha" >> $env:GITHUB_OUTPUT

      - name: 发布 Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          body: |
            版本 ${{ github.ref_name }}
            Zip SHA256: ${{ steps.sha256.outputs.sha }}
          files: |
            dist/MintNTE.exe
            MintNTE.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}