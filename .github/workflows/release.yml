name: 自动打包发布

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 打包为 MintNTE.exe
        shell: powershell
        run: |
          pyinstaller --noconfirm --onefile --noconsole `
            --name MintNTE `
            --icon "Image/logo/titlelogo.ico" `
            --add-data "Image;Image" `
            --add-data "core;core" `
            --add-data "core/fishing/fishingimages;fishingimages" `
            --add-data "Module;Module" `
            --add-data "UI;UI" `
            --add-data "updater;updater" `
            --add-data "tools;tools" `
            --add-data "version.txt;." `
            --hidden-import=pygame `
            --hidden-import=dxcam `
            --hidden-import=pydirectinput `
            --hidden-import=keyboard `
            --hidden-import=mouse `
            --hidden-import=cv2 `
            --hidden-import=numpy `
            --hidden-import=PIL `
            --hidden-import=win32gui `
            --hidden-import=win32ui `
            --hidden-import=win32con `
            --hidden-import=ctypes `
            --hidden-import=comtypes `
            --hidden-import=logging `
            --collect-all dxcam `
            --collect-all pydirectinput `
            main.py

      - name: 打包源代码 (zip)
        shell: powershell
        run: |
          $tempDir = "temp_pkg"
          New-Item -ItemType Directory -Force -Path $tempDir | Out-Null
          Get-ChildItem -Exclude @('.git','__pycache__','*.log','debug_screenshot.png','macro_config.json','.github','tools','build','dist','temp_pkg') | 
            Copy-Item -Recurse -Force -Destination $tempDir
          Compress-Archive -Path "$tempDir\*" -DestinationPath "NTE-ai.zip" -Force
          Remove-Item -Recurse -Force $tempDir

      - name: 计算 SHA256
        id: sha256
        shell: powershell
        run: |
          $sha = (Get-FileHash -Algorithm SHA256 "NTE-ai.zip").Hash.ToLower()
          "sha=$sha" >> $env:GITHUB_OUTPUT

      - name: 创建 Release 并上传
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          body: |
            版本 ${{ github.ref_name }}
            Zip SHA256: ${{ steps.sha256.outputs.sha }}
          files: |
            dist/MintNTE.exe
            NTE-ai.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}