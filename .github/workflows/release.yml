name: 自动打包发布

on:
  push:
    tags:
      - 'v*'          # 推送 v 开头的标签时触发

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 打包源码（排除不必要的文件）
        run: |
          zip -r NTE-ai.zip . \
            -x ".git/*" \
            -x "__pycache__/*" \
            -x "*.log" \
            -x "debug_screenshot.png" \
            -x "macro_config.json" \
            -x ".github/*"

      - name: 计算 SHA256
        id: sha256
        run: echo "sha=$(sha256sum NTE-ai.zip | cut -d ' ' -f 1)" >> $GITHUB_OUTPUT

      - name: 创建 Release 并上传文件
        uses: softprops/action-gh-release@v1
        with:
          name: ${{ github.ref_name }}
          body: |
            版本 ${{ github.ref_name }}
            SHA256: ${{ steps.sha256.outputs.sha }}
          files: NTE-ai.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}