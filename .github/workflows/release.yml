name: 自动打包发布

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write    # 关键：赋予写权限，允许创建 Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: 打包源码
        run: |
          zip -r NTE-ai.zip . \
            -x ".git/*" \
            -x "__pycache__/*" \
            -x "*.log" \
            -x "debug_screenshot.png" \
            -x "macro_config.json" \
            -x ".github/*" \
            -x "tools/*"

      - name: 计算 SHA256
        id: sha256
        run: echo "sha=$(sha256sum NTE-ai.zip | cut -d ' ' -f 1)" >> $GITHUB_OUTPUT

      - name: 创建 Release 并上传
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          body: |
            版本 ${{ github.ref_name }}
            SHA256: ${{ steps.sha256.outputs.sha }}
          files: NTE-ai.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}