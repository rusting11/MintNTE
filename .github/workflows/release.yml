name: 自动打包发布

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python 3.10 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 确认 Python 环境
        shell: pwsh
        run: |
          python --version
          python -m pip install --upgrade pip

      - name: 安装依赖
        shell: pwsh
        run: |
          pip install -r requirements.txt

      - name: 打包 MintNTE（onedir）
        shell: pwsh
        run: |
          pyinstaller --noconfirm --onedir --noconsole --clean `
            --name MintNTE `
            --icon "Image/logo/titlelogo.ico" `
            --add-data "Image;Image" `
            --add-data "core;core" `
            --add-data "core/fishing/fishingimages;fishingimages" `
            --add-data "core/fishing/fishingimages/rank_fish;rank_fish" `
            --add-data "Module;Module" `
            --add-data "UI;UI" `
            --add-data "updater;updater" `
            --add-data "version.txt;." `
            --hidden-import=pygame `
            --hidden-import=dxcam `
            --hidden-import=pydirectinput `
            --hidden-import=keyboard `
            --hidden-import=mouse `
            --hidden-import=cv2 `
            --hidden-import=numpy `
            --hidden-import=PIL `
            --hidden-import=win32gui `
            --hidden-import=win32ui `
            --hidden-import=win32con `
            --hidden-import=ctypes `
            --hidden-import=comtypes `
            --hidden-import=logging `
            --hidden-import=psutil `
            --collect-all dxcam `
            --collect-all pydirectinput `
            --collect-all windows_capture `
            main.py

      - name: 打包可运行目录为更新包 (MintNTE.zip)
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\MintNTE\*" -DestinationPath "MintNTE.zip" -Force

      - name: 计算 SHA256
        id: sha256
        shell: pwsh
        run: |
          $sha = (Get-FileHash -Algorithm SHA256 "MintNTE.zip").Hash.ToLower()
          echo "sha=$sha" >> $env:GITHUB_OUTPUT

      - name: 发布 Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          body: |
            版本 ${{ github.ref_name }}
            Zip SHA256: ${{ steps.sha256.outputs.sha }}
          files: |
            MintNTE.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}