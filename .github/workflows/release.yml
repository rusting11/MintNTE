name: 自动打包发布

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 打包为 MintNTE.exe（带图标）
        shell: powershell
        run: |
          pyinstaller --noconfirm --onefile `
            --name MintNTE `
            --icon "Image/logo/titlelogo.ico" `
            --add-data "Image;Image" `
            --add-data "core;core" `
            --add-data "core/fishing/fishingimages;fishingimages" `
            --add-data "Module;Module" `
            --add-data "UI;UI" `
            --add-data "updater;updater" `
            --add-data "tools;tools" `
            --add-data "version.txt;." `
            --hidden-import=pygame `
            --hidden-import=pydirectinput `
            --hidden-import=keyboard `
            --hidden-import=mouse `
            --hidden-import=cv2 `
            --hidden-import=numpy `
            --hidden-import=PIL `
            --hidden-import=win32gui `
            --hidden-import=dxcam `
            --collect-all dxcam `
            --collect-all pydirectinput `
            main.py

      - name: 计算 SHA256
        id: sha256
        shell: bash
        run: |
          sha256sum dist/MintNTE.exe | cut -d ' ' -f 1 > sha.txt
          echo "sha=$(cat sha.txt)" >> $GITHUB_OUTPUT

      - name: 创建 Release 并上传 MintNTE.exe
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          body: |
            版本 ${{ github.ref_name }}
            SHA256: ${{ steps.sha256.outputs.sha }}
          files: dist/MintNTE.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}