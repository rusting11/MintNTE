name: 自动打包发布

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: 设置 Python
        uses: actions/setup-python@v6            # 🆕 升级到 v6 消除 Node 20 警告
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 打包为 MintNTE.exe（带图标）
        shell: powershell
        run: |
          pyinstaller --noconfirm --onefile --console `
            --name MintNTE `
            --icon "Image/logo/titlelogo.ico" `
            --add-data "Image;Image" `
            --add-data "core;core" `
            --add-data "core/fishing/fishingimages;fishingimages" `
            --add-data "Module;Module" `
            --add-data "UI;UI" `
            --add-data "updater;updater" `
            --add-data "tools;tools" `
            --add-data "version.txt;." `
            --hidden-import=pygame `
            --hidden-import=pydirectinput `
            --hidden-import=keyboard `
            --hidden-import=mouse `
            --hidden-import=cv2 `
            --hidden-import=numpy `
            --hidden-import=PIL `
            --hidden-import=win32gui `
            --hidden-import=win32ui `
            --hidden-import=win32con `
            --hidden-import=ctypes `
            --hidden-import=dxcam `
            --hidden-import=comtypes `
            --hidden-import=logging `
            --collect-all dxcam `
            --collect-all pydirectinput `
            main.py

      - name: 打包源码 (NTE-ai.zip) - PowerShell
        shell: powershell
        run: |
          # 创建临时目录，复制需要打包的文件
          $tempDir = New-Item -ItemType Directory -Force -Path "temp_package"
          Copy-Item -Recurse -Force * -Destination $tempDir
          # 删除不需要的文件夹和文件
          Remove-Item -Recurse -Force -ErrorAction SilentlyContinue "$tempDir\.git", "$tempDir\__pycache__", "$tempDir\*.log", "$tempDir\debug_screenshot.png", "$tempDir\macro_config.json", "$tempDir\.github", "$tempDir\tools", "$tempDir\build", "$tempDir\dist", "$tempDir\temp_package"
          # 压缩为 NTE-ai.zip
          Compress-Archive -Path "$tempDir\*" -DestinationPath "NTE-ai.zip" -Force
          Remove-Item -Recurse -Force $tempDir

      - name: 计算 SHA256 (zip)
        id: sha256
        shell: bash
        run: |
          sha256sum NTE-ai.zip | cut -d ' ' -f 1 > sha.txt
          echo "sha=$(cat sha.txt)" >> $GITHUB_OUTPUT

      - name: 创建 Release 并上传
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          body: |
            版本 ${{ github.ref_name }}
            Zip SHA256: ${{ steps.sha256.outputs.sha }}
          files: |
            dist/MintNTE.exe
            NTE-ai.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}