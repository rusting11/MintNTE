name: Build and Release

on:
  push:
    tags:
      - 'v*'          # 推送 v1.0.2 这样的标签时触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许创建 Release 和上传附件
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies (optional)
        run: pip install -r requirements.txt

      - name: Package files
        run: |
          mkdir release_package
          cp -r *.py *.txt *.ico images fishingimages release_package/ 2>/dev/null || true
          rm -rf release_package/__pycache__ release_package/.git release_package/venv* release_package/.env
          cd release_package
          zip -r ../异环薄荷AI.zip .
          cd ..

      - name: Create Release and Upload Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "Creating release for tag: $TAG_NAME"
          gh release create "$TAG_NAME" ./异环薄荷AI.zip \
            --title "$TAG_NAME" \
            --notes "自动构建版本 $TAG_NAME" \
            --target main \
            --repo ${{ github.repository }} \
            --draft=false \
            --prerelease=false || echo "Release may already exist, skipping creation"